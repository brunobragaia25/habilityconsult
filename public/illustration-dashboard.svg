<svg width="568" height="380" viewBox="0 0 568 380" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="568" height="380" rx="16" fill="#AC3314"/>

  <!-- White card background -->
  <g filter="drop-shadow(0px 16.085px 31px rgba(241,90,41,0.2))">
    <rect x="45" y="56" width="478" height="324" rx="18" fill="white"/>
  </g>

  <!-- Metric boxes -->
  <g>
    <!-- Margem -->
    <rect x="60" y="80" width="130" height="82" rx="12" fill="white" stroke="#E8E8E8" stroke-width="1"/>
    <text x="75" y="105" font-family="Inter, sans-serif" font-size="13" font-weight="500" fill="#F15A29">Margem</text>
    <text x="75" y="145" font-family="Inter, sans-serif" font-size="24" font-weight="600" fill="#4A4A4A">32%</text>

    <!-- Resultado -->
    <rect x="210" y="80" width="130" height="82" rx="12" fill="white" stroke="#E8E8E8" stroke-width="1"/>
    <text x="225" y="105" font-family="Inter, sans-serif" font-size="13" font-weight="500" fill="#F15A29">Resultado</text>
    <text x="225" y="145" font-family="Inter, sans-serif" font-size="24" font-weight="600" fill="#4A4A4A">+18%</text>

    <!-- Desvio -->
    <rect x="360" y="80" width="130" height="82" rx="12" fill="white" stroke="#E8E8E8" stroke-width="1"/>
    <text x="375" y="105" font-family="Inter, sans-serif" font-size="13" font-weight="500" fill="#F15A29">Desvio</text>
    <text x="375" y="145" font-family="Inter, sans-serif" font-size="24" font-weight="600" fill="#4A4A4A">-2%</text>
  </g>

  <!-- Chart area -->
  <g>
    <!-- Chart box -->
    <rect x="60" y="185" width="130" height="91" rx="12" fill="white" stroke="#E8E8E8" stroke-width="1"/>

    <!-- Chart bars -->
    <rect x="75" y="245" width="11" height="14" rx="3" fill="#F15A29"/>
    <rect x="90" y="240" width="11" height="21" rx="3" fill="#FABE9E"/>
    <rect x="105" y="238" width="11" height="25" rx="3" fill="#F15A29"/>
    <rect x="120" y="235" width="11" height="30" rx="3" fill="#FABE9E"/>
    <rect x="135" y="230" width="11" height="37" rx="3" fill="#F15A29"/>
    <rect x="150" y="226" width="11" height="42" rx="3" fill="#FABE9E"/>
    <rect x="165" y="220" width="11" height="49" rx="3" fill="#F15A29"/>
  </g>

  <!-- Dimensions box -->
  <g>
    <rect x="210" y="185" width="280" height="91" rx="12" fill="white" stroke="#E8E8E8" stroke-width="1"/>

    <!-- Filial SP -->
    <text x="225" y="210" font-family="Inter, sans-serif" font-size="13" font-weight="500" fill="#F15A29">Filial SP</text>
    <rect x="330" y="200" width="150" height="20" rx="10" fill="#FDE0D0"/>
    <text x="355" y="215" font-family="Inter, sans-serif" font-size="10" font-weight="500" fill="#A0A0A0" text-anchor="middle">CC 101</text>

    <!-- Projeto A -->
    <text x="225" y="245" font-family="Inter, sans-serif" font-size="13" font-weight="500" fill="#F15A29">Projeto A</text>
    <rect x="330" y="235" width="150" height="20" rx="10" fill="#FDE0D0"/>
    <text x="355" y="250" font-family="Inter, sans-serif" font-size="10" font-weight="500" fill="#A0A0A0" text-anchor="middle">CC 205</text>

    <!-- Projeto B -->
    <text x="225" y="280" font-family="Inter, sans-serif" font-size="13" font-weight="500" fill="#F15A29">Projeto B</text>
    <rect x="330" y="270" width="150" height="20" rx="10" fill="#FDE0D0"/>
    <text x="355" y="285" font-family="Inter, sans-serif" font-size="10" font-weight="500" fill="#A0A0A0" text-anchor="middle">CC 206</text>
  </g>

  <!-- Progress bar -->
  <g>
    <rect x="60" y="295" width="430" height="12" rx="6" fill="#D9D9D9"/>
    <rect x="60" y="295" width="255" height="12" rx="6" fill="#F6986C"/>
  </g>
</svg>
